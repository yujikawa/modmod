  - id: fct_orders
    name: Orders
    logical_name: Order Transactions
    physical_name: fct_orders
    appearance:
      type: fact
      icon: 📊
    conceptual:
      description: One row = one order line item. Built from hub_order + lnk_order_line + sat_order_header.
      tags:
        - WHAT
        - HOW_MUCH
      businessDefinitions:
        net_revenue: Unit price × quantity minus discount. Excludes tax and shipping.
    implementation:
      materialization: incremental
      incremental_strategy: merge
      unique_key:
        - order_id
        - product_key
      partition_by:
        - field: order_date
          granularity: day
    columns:
      - id: order_id
        logical:
          name: Order ID
          type: String
          isPrimaryKey: true
      - id: customer_key
        logical:
          name: Customer Key
          type: Int
          isForeignKey: true
      - id: product_key
        logical:
          name: Product Key
          type: Int
          isForeignKey: true
      - id: date_key
        logical:
          name: Date Key
          type: Int
          isForeignKey: true
      - id: order_date
        logical:
          name: Order Date
          type: Date
          isPartitionKey: true
      - id: quantity
        logical:
          name: Quantity
          type: Int
          additivity: fully
      - id: unit_price
        logical:
          name: Unit Price
          type: Decimal
          additivity: non
      - id: net_revenue
        logical:
          name: Net Revenue
          type: Decimal
          additivity: fully
    sampleData:
      - - order_id
        - customer_key
        - product_key
        - date_key
        - quantity
        - unit_price
        - net_revenue
      - - ORD-1001
        - 42
        - 7
