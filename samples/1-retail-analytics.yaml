        - 1
        - 499
        - 499
  - id: mart_daily_revenue
    name: Daily Revenue
    logical_name: Daily Revenue Summary
    physical_name: mart_daily_revenue
    appearance:
      type: mart
      icon: 📈
    conceptual:
      description: Daily revenue aggregated by category and region. Refreshed hourly.
      tags:
        - HOW_MUCH
        - WHEN
      businessDefinitions:
        gross_revenue: Sum of net_revenue before any returns or adjustments.
    implementation:
      materialization: table
      grain:
        - date_key
        - category
        - country_code
      measures:
        - column: gross_revenue
          agg: sum
          source_column: fct_orders.net_revenue
        - column: order_count
          agg: count_distinct
          source_column: fct_orders.order_id
        - column: units_sold
          agg: sum
          source_column: fct_orders.quantity
    columns:
      - id: date_key
        logical:
          name: Date Key
          type: Int
          isPrimaryKey: true
      - id: category
        logical:
          name: Category
          type: String
          isPrimaryKey: true
      - id: country_code
        logical:
          name: Country Code
          type: String
          isPrimaryKey: true
      - id: gross_revenue
        logical:
          name: Gross Revenue
          type: Decimal
          additivity: fully
      - id: order_count
        logical:
          name: Order Count
          type: Int
          additivity: fully
      - id: units_sold
        logical:
          name: Units Sold
          type: Int
          additivity: fully
    sampleData: []
  - id: mart_product_performance
    name: Product Performance
    physical_name: mart_product_performance
    appearance:
      type: mart
      icon: 🏆
    conceptual:
      description: Monthly product ranking by revenue and units. Used for merchandising decisions.
      tags:
        - WHAT
        - HOW_MUCH
    implementation:
      materialization: table
      grain:
        - month_key
        - product_key
      measures:
        - column: total_revenue
          agg: sum
          source_column: fct_orders.net_revenue
        - column: total_units
          agg: sum
          source_column: fct_orders.quantity
    columns:
      - id: month_key
        logical:
          name: Month Key
          type: Int
          isPrimaryKey: true
      - id: product_key
        logical:
          name: Product Key
          type: Int
          isPrimaryKey: true
      - id: total_revenue
        logical:
          name: Total Revenue
          type: Decimal
          additivity: fully
      - id: total_units
        logical:
          name: Total Units
          type: Int
          additivity: fully
      - id: revenue_rank
        logical:
          name: Revenue Rank
          type: Int
          additivity: non
    sampleData: []
