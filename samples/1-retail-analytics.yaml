domains:
  - id: raw_vault
    name: Raw Vault
    description: Immutable historical record loaded from source systems
    color: rgba(234, 179, 8, 0.08)
    members:
      - hub_customer
      - hub_product
      - hub_order
      - lnk_order_line
      - sat_customer_profile
      - sat_product_details
      - sat_order_header
  - id: star_schema
    name: Star Schema
    description: Conformed dimensional model built from the Raw Vault
    color: rgba(59, 130, 246, 0.08)
    members:
      - dim_customers
      - dim_products
      - dim_dates
      - fct_orders
  - id: mart
    name: Data Mart
    description: Aggregated models ready for BI consumption
    color: rgba(249, 115, 22, 0.08)
    members:
      - mart_daily_revenue
      - mart_product_performance
consumers:
  - id: sales_dashboard
    name: Sales Dashboard
    description: Real-time revenue and order metrics for the sales team
    appearance:
      icon: 📊
      color: '#f97316'
    url: https://bi.example.com/sales
  - id: exec_report
    name: Executive Report
    description: Weekly summary report delivered to leadership
    appearance:
      icon: 📋
      color: '#8b5cf6'
annotations:
  - id: note_vault_to_star
    type: callout
    text: |-
      Raw Vault → Star Schema
      Hub + Satellite = Dimension
      Hub + Link + Satellite = Fact
    color: '#fef9c3'
    targetId: raw_vault
    targetType: domain
    offset:
      x: 20
      'y': -80
  - id: note_grain
    type: sticky
    text: |-
      Grain: order_id × product
      (one row per order line)
    color: '#7f7348'
    targetId: fct_orders
    targetType: table
    offset:
      x: 300
      'y': 20
  - id: note_import
    type: callout
    text: |-
      Imported from conformed-dims.yaml
      Edit the source to update.
    color: '#6b5ea1'
    targetId: dim_dates
    targetType: table
    offset:
      x: 300
      'y': 0
