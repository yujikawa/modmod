lineage:
  - from: stg_customers
    to: dim_customers
  - from: stg_products
    to: dim_products
  - from: stg_orders
    to: fct_orders
  - from: stg_order_items
    to: fct_orders
  - from: fct_orders
    to: mart_daily_revenue
  - from: dim_dates
    to: mart_daily_revenue
