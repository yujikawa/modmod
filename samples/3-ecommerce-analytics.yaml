relationships:
  - from:
      table: stg_orders
      column: order_id
    to:
      table: stg_order_items
      column: order_id
    type: one-to-many
  - from:
      table: dim_customers
      column: customer_key
    to:
      table: fct_orders
      column: customer_key
    type: one-to-many
  - from:
      table: dim_products
      column: product_key
    to:
      table: fct_orders
      column: product_key
    type: one-to-many
  - from:
      table: dim_dates
      column: date_key
    to:
      table: fct_orders
      column: order_date_key
    type: one-to-many
domains:
  - id: staging
    name: Staging
    description: Raw data from source systems
    color: rgba(100, 116, 139, 0.12)
    tables:
      - stg_customers
      - stg_products
      - stg_orders
      - stg_order_items
  - id: core_dwh
    name: Core DWH
    description: Conformed dimensions and incremental fact table
    color: rgba(59, 130, 246, 0.1)
    tables:
      - dim_customers
      - dim_products
      - dim_dates
      - fct_orders
  - id: analytics_mart
    name: Analytics Mart
    description: Business-facing aggregated summaries
    color: rgba(245, 158, 11, 0.1)
    tables:
      - mart_daily_revenue
      - mart_customer_ltv
      - mart_product_performance
