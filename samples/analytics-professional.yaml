tables:
  - id: fct_orders
    name: Orders (Transaction Fact)
    appearance:
      type: fact
      sub_type: transaction
      icon: 💰
    conceptual:
      description: Individual sales transactions
      tags:
        - WHO
        - WHEN
        - HOW MUCH
    columns:
      - id: order_id
        logical:
          name: ID
          type: Int
          isPrimaryKey: true
      - id: amount
        logical:
          name: Sales Amount
          type: Decimal
          additivity: fully
      - id: tax_amount
        logical:
          name: Tax Amount
          type: Decimal
          additivity: fully
      - id: order_at
        logical:
          name: Order Timestamp
          type: Timestamp
          isMetadata: true
    sampleData: []
  - id: fct_monthly_inventory
    name: Inventory (Periodic Snapshot)
    appearance:
      type: fact
      sub_type: periodic
      icon: 📦
    conceptual:
      description: Monthly stock levels at end of period
    columns:
      - id: snapshot_month
        logical:
          name: Month
          type: Date
          isPrimaryKey: true
      - id: product_id
        logical:
          name: Product ID
          type: Int
          isForeignKey: true
      - id: stock_qty
        logical:
          name: Stock Quantity
          type: Int
          additivity: semi
      - id: valuation
        logical:
          name: Inventory Value
          type: Decimal
          additivity: semi
    sampleData: []
  - id: fct_shipping_process
    name: Shipping (Accumulating Snapshot)
    appearance:
      type: fact
      sub_type: accumulating
      icon: 🚚
    conceptual:
      description: Milestones from order to delivery
    columns:
      - id: order_id
        logical:
          name: Order ID
          type: Int
          isPrimaryKey: true
      - id: days_to_ship
        logical:
          name: Days to Ship
          type: Int
          additivity: non
      - id: is_delayed
        logical:
          name: Delay Flag
          type: Boolean
          additivity: non
    sampleData: []
  - id: fct_promo_participation
    name: Promotion (Factless Fact)
    appearance:
      type: fact
      sub_type: factless
      icon: 🏷️
    conceptual:
      description: Records of customers participating in promos
    columns:
      - id: customer_id
        logical:
          name: Customer ID
          type: Int
          isForeignKey: true
      - id: promo_id
        logical:
          name: Promo ID
          type: Int
          isForeignKey: true
    sampleData: []
  - id: dim_customers
    name: Customers (SCD Type 2)
    appearance:
      type: dimension
      sub_type: type2
      icon: 👤
    columns:
      - id: customer_key
        logical:
          name: Surrogate Key
          type: Int
          isPrimaryKey: true
      - id: customer_id
        logical:
          name: Natural ID
          type: Int
      - id: name
        logical:
          name: Customer Name
          type: String
      - id: valid_from
        logical:
          name: Valid From
          type: Timestamp
          isMetadata: true
      - id: valid_to
        logical:
          name: Valid To
          type: Timestamp
          isMetadata: true
      - id: is_current
        logical:
          name: Current Flag
          type: Boolean
          isMetadata: true
    sampleData: []
relationships:
  - from:
      table: fct_orders
      column: order_id
    to:
      table: fct_shipping_process
      column: order_id
    type: one-to-one
  - from:
      table: fct_monthly_inventory
      column: product_id
    to:
      table: dim_products
      column: id
    type: many-to-one
domains: []
layout:
  fct_orders:
    x: 357
    'y': 73
    width: 320
  fct_shipping_process:
    x: 701
    'y': 501
    width: 320
  fct_monthly_inventory:
    x: 247
    'y': 515
    width: 320
  fct_promo_participation:
    x: 416
    'y': 325
    width: 320
  dim_customers:
    x: -33
    'y': 168
    width: 320
